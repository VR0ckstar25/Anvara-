plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sfis.scanner'
    compileSdk 33
    buildToolsVersion "33.0.0"

    defaultConfig {
        applicationId "com.sfis.scanner"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            // debuggable APK, no minification — easiest to iterate on
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Pure framework WebView wrapper — no third-party deps on purpose.
}
